<!DOCTYPE html>
<html>
<head>
    <title>Spring Boot Calculator</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    text-align:center;
    width:300px;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:10px 20px;
    background:#4facfe;
    border:none;
    border-radius:6px;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0077ff;
}

#result{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Add Two Numbers</h2>

<input type="number" id="num1" placeholder="Enter first number">

<input type="number" id="num2" placeholder="Enter second number">

<button onclick="addNumbers()">Add</button>

<div id="result"></div>

</div>

<script>

async function addNumbers(){

    let a = document.getElementById("num1").value;
    let b = document.getElementById("num2").value;

    const response = await fetch(`/api/add?a=${a}&b=${b}`);

    const data = await response.json();

    document.getElementById("result").innerText =
        "Result = " + data.result;

}

</script>

</body>
</html>
